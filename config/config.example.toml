# MapKy Indexer Configuration
# Local dev: testnet = true (requires pubky-docker stack)
# Production: testnet = false, update homeserver + DB credentials

[api]
name = "mapkyd.api"
port = 8090
# Pubky network mode — must match [watcher] settings.
# The API needs PubkyConnector for the ingest endpoint (homeserver resolution via DHT).
testnet = false
testnet_host = "localhost"

[watcher]
name = "mapkyd.watcher"
# Seed/default homeserver. Additional homeservers are discovered via PUT /v0/ingest/{user_id}.
homeserver = "8pinxxgqs41n4aididenw5apqp1urfmzdztr8jt4abrkdn435ewo"
events_limit = 1000
watcher_sleep = 5000
testnet = false
testnet_host = "localhost"

[stack]
log_level = "info"

[stack.db.neo4j]
uri = "bolt://localhost:7687"
user = "neo4j"
password = "12345678"

[stack.db.postgres]
url = "postgres://mapky:mapky@localhost:5432/mapky"
max_connections = 10

# Geocoding: resolves OSM element coordinates when the watcher encounters new places.
# Default: public Nominatim (rate-limited to 1 req/s). Use a self-hosted instance in production.
[stack.geocoding]
nominatim_url = "https://nominatim.openstreetmap.org"
